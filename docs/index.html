<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kioskwm</title>
  <style>
    :root { color-scheme: dark; --bg:#1a1d21; --fg:#eff0f1; --muted:#bdc3c7; --accent:#3daee9; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; }
    main { max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
    h1 { font-size: 2.4rem; margin: 0 0 .5rem; }
    .tagline { color: var(--muted); margin-bottom: 2rem; }
    a { color: var(--accent); }
    code, pre { background: #232629; border-radius: 8px; }
    code { padding: .15rem .4rem; }
    pre { padding: 1rem; overflow-x: auto; }
    section { margin: 2rem 0; }
  </style>
</head>
<body>
  <main>
    <h1>kioskwm</h1>
    <p class="tagline">Wayland compositor for kiosk and nested desktop use.</p>
    <section>
      <h2>Repository</h2>
      <p><a href="https://github.com/mdf-leon/kioskwm">github.com/mdf-leon/kioskwm</a></p>
    </section>
    <section>
      <h2>Run (nested)</h2>
      <pre><code>cargo run --release -- --desktop</code></pre>
    </section>
    <section>
      <h2>Ubuntu runtime deps</h2>
      <pre><code>sudo apt install libseat1 libinput10 libgbm1 libxkbcommon0 libudev1 libdrm2 xwayland</code></pre>
    </section>
  </main>
</body>
</html>
